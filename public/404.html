<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>wolfor-koadon</title>
  <script>
    /* SPA: перенаправляем все 404 на index.html — React Router разберёт маршрут */
    var path = window.location.pathname;
    /* Корень репо (user site) — просто редирект на index.html */
    if (path === '/') {
      window.location.href = 'index.html';
    } else {
      /* Поддиректория (project site) — убираем имя файла, добавляем ../ */
      var parts = path.split('/').filter(Boolean);
      var base = parts.length > 1 ? '../' : '';
      window.location.href = base + 'index.html';
    }
  </script>
</head>
<body>
  <noscript>
    <meta http-equiv="refresh" content="0;url=./index.html">
  </noscript>
</body>
</html>
