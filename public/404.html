П<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>wolfor-koadon</title>
  <script>
    /* SPA: перенаправляем все 404 на index.html — React Router разберёт маршрут */
    var path = window.location.pathname;
    var parts = path.split('/').filter(Boolean);
    /* basename — первое имя папки (для GitHub Pages project site это имя репо) */
    var basename = parts.length > 0 ? '/' + parts[0] : '';

    /* Это SPA-роут, а не запрос файла — перенаправляем */
    var lastPart = parts.length > 0 ? parts[parts.length - 1] : '';
    if (lastPart && !lastPart.includes('.')) {

      /* Мы уже на главной странице репо — редирект на index.html внутри basename */
      if (path === '/' || path === basename || path === basename + '/') {
        window.location.href = basename + '/index.html';
      } else {
        /* Вложенный роут — перенаправляем на index.html в папке basename */
        window.location.href = basename + '/index.html';
      }
    }
  </script>
</head>
<body>
  <noscript>
    <meta http-equiv="refresh" content="0;url=./index.html">
  </noscript>
</body>
</html>
