<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>wolfor-koadon</title>
  <script>
    /* SPA: перенаправляем все 404 на index.html — React Router разберёт маршрут */
    var path = window.location.pathname;
    var file = path.split('/').pop();
    if (file && !file.includes('.')) {
      /* Это маршрут SPA, а не запрос файла */
      window.location.href = './index.html';
    }
  </script>
</head>
<body>
  <noscript>
    <meta http-equiv="refresh" content="0;url=./index.html">
  </noscript>
</body>
</html>
